<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Bite Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;700&family=Google+Sans:wght@400;700&display=swap" rel="stylesheet">
  <!-- Reuse the live site's stylesheet so tokens, fonts, buttons and the
       .hero-cta-panel treatment stay identical to biteinsight.co.uk. -->
  <link rel="stylesheet" href="https://biteinsight.co.uk/css/styles.css">
  <style>
    /* Page-specific layout only — everything visual comes from styles.css */
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px;
    }
    .continue-wrap{max-width:460px;width:100%;text-align:center;}
    .continue-logo{width:184px;height:auto;margin:0 auto 28px;display:block;}
    /* Centre the panel's contents for this focused single-card page */
    .continue-wrap .hero-cta-panel{align-items:center;text-align:center;gap:24px;}
    .continue-wrap .hero-cta-text{font-size:20px;line-height:30px;letter-spacing:-0.4px;}
    .continue-wrap .hero-cta-buttons{justify-content:center;width:100%;}
    .continue-wrap .hero-cta-buttons .btn{width:100%;}
    .store-row{width:100%;}
    .store-row .store-label{
      font-family:var(--font);font-weight:300;font-size:13px;color:var(--secondary);
      margin-bottom:12px;
    }
    .store-badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .store-badges img{height:40px;width:auto;display:block;}
    .continue-hint{
      font-family:var(--font);font-weight:300;font-size:12px;color:#7fa8a1;
      margin-top:20px;
    }
  </style>
</head>
<body>
  <div class="continue-wrap">
    <img class="continue-logo" src="https://biteinsight.co.uk/images/logo-full.svg" alt="Bite Insight">

    <div class="hero-cta-panel">
      <div class="hero-cta-text">
        <span class="font-light">You're almost there. Open Bite Insight to finish setting up your </span><span class="font-bold-italic">profile</span><span class="font-light">.</span>
      </div>

      <div class="hero-cta-buttons">
        <a class="btn btn-gradient btn-lg" id="openBtn" href="biteinsight://">Open Bite Insight</a>
      </div>

      <div class="store-row">
        <div class="store-label">Don't have the app yet?</div>
        <div class="store-badges">
          <a href="https://apps.apple.com/app/id6760033160">
            <img src="https://biteinsight.co.uk/images/app-store-badge.svg" alt="Download on the App Store">
          </a>
          <a href="https://play.google.com/store/apps/details?id=com.biteinsightapp.gcahill">
            <img src="https://biteinsight.co.uk/images/google-play-badge.svg" alt="Get it on Google Play">
          </a>
        </div>
      </div>
    </div>

    <p class="continue-hint">If the app doesn't open on its own, tap “Open Bite Insight” above.</p>
  </div>

  <script>
    // Attempt to open the app once, shortly after load. The button is the
    // reliable fallback (some browsers block auto-launching custom schemes
    // without a user gesture). When the app opens, the in-app JourneyGuard
    // routes the user to wherever they left off in onboarding.
    (function () {
      var tried = false;
      function openApp() { if (tried) return; tried = true; window.location.href = 'biteinsight://'; }
      setTimeout(openApp, 600);
      document.getElementById('openBtn').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = 'biteinsight://';
      });
    })();
  </script>
</body>
</html>
